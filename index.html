<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q3 Skills Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
    <div class="ticket-box mx-auto border">
        <div class="blue-header text-center p-2">
            <h3>CINE SOPHIA TICKETS</h3>
        </div>

        <div class="p-4">
            <p>Full Name</p>
            <input type="text" id="uName" class="form-control mb-3">

            <p>Quantity (₱250 each)</p>
            <input type="number" id="uQty" class="form-control mb-3" value="0" min="0">

            <div class="bg-light p-3 border">
                <p>Subtotal: <span id="resSub">₱0.00</span></p>
                <p>Admin Fee: ₱50.00</p>
                <hr>
                <p><b>Total: <span id="resTotal">₱0.00</span></b></p>
            </div>

            <div class="mt-3">
                <button class="btn btn-primary" onclick="primary()">Complete Registration</button>
                <button class="btn btn-secondary" onclick="resetall()">Reset</button>
            </div>
        </div>
    </div>
</div>

<script src="main.js"></script>

</body>
</html>
